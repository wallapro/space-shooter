<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>שאגת הארי</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; font-family: 'Courier New', monospace; color: #fff; overflow: hidden; touch-action: none; }
  #gameCanvas { border: 2px solid #0ff; box-shadow: 0 0 20px #0ff, 0 0 40px #00f; max-width: 100vw; max-height: calc(100vh - 50px); width: auto; height: auto; }
  #ui { display: flex; justify-content: space-between; width: min(600px, 100vw); padding: 8px 4px; font-size: clamp(12px, 3vw, 16px); }
  .stat { color: #0ff; text-shadow: 0 0 8px #0ff; }
  #message { position: absolute; font-size: 36px; color: #ff0; text-shadow: 0 0 15px #ff0; text-align: center; display: none; }
</style>
</head>
<body>
<div id="ui">
  <span class="stat">❤️ <span id="lives">3</span></span>
  <span class="stat">WAVE <span id="wave">1</span></span>
  <span class="stat">⭐ <span id="score">0</span></span>
</div>
<canvas id="gameCanvas" width="600" height="700"></canvas>
<div id="message"></div>

<script>
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// ===== STATE =====
let state = 'start'; // start, playing, paused, gameover, victory
let score = 0, lives = 3, wave = 1, maxWave = 10;
let frameCount = 0;
let powerups = [], particles = [], stars = [], floatingTexts = [];
let bossActive = false;
let screenShake = 0;
let highScore = parseInt(localStorage.getItem('shagatHaariHighScore') || '0');
let touchState = { left: false, right: false, up: false, down: false, fire: false };
const isTouchDevice = 'ontouchstart' in window || navigator.maxTouchPoints > 0 || window.matchMedia('(pointer: coarse)').matches;
let waveFormation = 'grid';
let waveBannerTimer = 0;

// ===== STARS BACKGROUND =====
for (let i = 0; i < 120; i++) {
  stars.push({ x: Math.random()*W, y: Math.random()*H, r: Math.random()*1.5+0.3, speed: Math.random()*0.5+0.2, bright: Math.random() });
}

// ===== INPUT =====
const keys = {};
window.addEventListener('keydown', e => {
  keys[e.code] = true;
  if (e.code === 'Space') e.preventDefault();
  audioCtx.resume(); // unlock audio on first interaction
  if (state === 'start' || state === 'gameover' || state === 'victory') {
    if (e.code === 'Enter' || e.code === 'Space') startGame();
  }
  if (e.code === 'KeyP') {
    state = (state === 'paused') ? 'playing' : 'paused';
    if (state === 'paused') bgMusic.pause(); else bgMusic.play().catch(()=>{});
  }
});
window.addEventListener('keyup', e => keys[e.code] = false);

// ===== MOUSE CONTROLS =====
let mouseX = null, mouseY = null, mouseDown = false;

canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) * (W / rect.width);
  mouseY = (e.clientY - rect.top) * (H / rect.height);
});

canvas.addEventListener('mousedown', e => {
  if (e.button === 0) {
    mouseDown = true;
    audioCtx.resume();
    if (state === 'start' || state === 'gameover' || state === 'victory') startGame();
  }
});

canvas.addEventListener('mouseup', e => { if (e.button === 0) mouseDown = false; });
canvas.addEventListener('mouseleave', () => { mouseDown = false; mouseX = null; });

// ===== TOUCH CONTROLS =====
const TOUCH_BTNS = {
  left:  { x: 10,      y: H - 85, w: 85, h: 75 },
  right: { x: 105,     y: H - 85, w: 85, h: 75 },
  up:    { x: 55,      y: H - 170, w: 75, h: 70 },
  fire:  { x: W - 120, y: H - 85, w: 110, h: 75 },
};

function getTouchBtn(tx, ty) {
  // tx/ty relative to canvas
  const rect = canvas.getBoundingClientRect();
  const scaleX = W / rect.width, scaleY = H / rect.height;
  const cx = (tx - rect.left) * scaleX;
  const cy = (ty - rect.top) * scaleY;
  for (const [name, b] of Object.entries(TOUCH_BTNS)) {
    if (cx >= b.x && cx <= b.x + b.w && cy >= b.y && cy <= b.y + b.h) return name;
  }
  return null;
}

function applyTouches(touches, active) {
  for (const t of touches) {
    const btn = getTouchBtn(t.clientX, t.clientY);
    if (btn) touchState[btn] = active;
  }
}

canvas.addEventListener('contextmenu', e => e.preventDefault());
canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  audioCtx.resume();
  if (state === 'start' || state === 'gameover' || state === 'victory') { startGame(); return; }
  applyTouches(e.changedTouches, true);
}, { passive: false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  touchState = { left:false, right:false, up:false, down:false, fire:false };
  applyTouches(e.touches, true);
}, { passive: false });

canvas.addEventListener('touchend', e => {
  e.preventDefault();
  touchState = { left:false, right:false, up:false, down:false, fire:false };
  applyTouches(e.touches, true);
}, { passive: false });

// ===== PLAYER =====
const player = {
  x: W/2, y: H - 70, w: 40, h: 50,
  speed: 5, bulletCooldown: 0,
  shield: 0, doubleFire: 0, laser: 0,
  invincible: 0,
  shoot() {
    const now = this.laser > 0 ? 6 : (this.doubleFire > 0 ? 10 : 15);
    if (this.bulletCooldown <= 0) {
      if (this.laser > 0) {
        bullets.push({ x: this.x, y: this.y - 30, w: 4, h: 20, speed: 14, color: '#f0f', type: 'laser' });
      } else if (this.doubleFire > 0) {
        bullets.push({ x: this.x - 12, y: this.y - 20, w: 4, h: 12, speed: 12, color: '#0ff', type: 'normal' });
        bullets.push({ x: this.x + 12, y: this.y - 20, w: 4, h: 12, speed: 12, color: '#0ff', type: 'normal' });
      } else {
        bullets.push({ x: this.x, y: this.y - 20, w: 4, h: 12, speed: 12, color: '#0f0', type: 'normal' });
      }
      this.bulletCooldown = now;
      playSound('shoot');
    }
  }
};

let bullets = [], enemyBullets = [], enemies = [];

// ===== ENEMY TYPES =====
function createEnemy(type, x, y) {
  const base = { x, y, w: 44, h: 44, hp: 1, maxHp: 1, speed: 1, shootTimer: 0, shootInterval: 120, points: 100, type };
  if (type === 'grunt') return { ...base, hp:1, maxHp:1, speed: 1+wave*0.15, points: 100, color:'#f44' };
  if (type === 'tank') return { ...base, hp:3, maxHp:3, speed: 0.7+wave*0.1, points: 250, color:'#fa0', w:52, h:52 };
  if (type === 'speeder') return { ...base, hp:1, maxHp:1, speed: 2.5+wave*0.2, points: 180, color:'#0af', shootInterval:80 };
  if (type === 'boss') return { ...base, hp: 15+wave*5, maxHp: 15+wave*5, speed: 1.2, points: 2000,
    color:'#f0f', w:90, h:90, shootInterval:40, phase:1, moveDir:1, moveTimer:0 };
  return base;
}

function getFormationPos(i, count, formation) {
  switch(formation) {
    case 'v-shape': {
      const half = Math.floor(count / 2);
      const side = i < half ? -1 : 1;
      const idx = i < half ? (half - 1 - i) : (i - half);
      return { x: W/2 + side * (idx + 1) * 44, y: 55 + idx * 30 };
    }
    case 'diamond': {
      const angle = (i / count) * Math.PI * 2;
      const rx = Math.min(220, count * 14);
      return { x: W/2 + Math.cos(angle) * rx, y: 130 + Math.sin(angle) * 70 };
    }
    case 'pincer': {
      const half = Math.ceil(count / 2);
      if (i < half) return { x: 80 + (i % 3) * 50, y: 55 + Math.floor(i/3) * 55 };
      else { const j = i - half; return { x: W - 80 - (j % 3) * 50, y: 55 + Math.floor(j/3) * 55 }; }
    }
    default: { // grid
      const cols = Math.min(count, 8);
      return { x: 60 + (i % cols) * ((W-80)/Math.min(count,8)), y: 60 + Math.floor(i/cols) * 70 };
    }
  }
}

function spawnWave() {
  enemies = [];
  bossActive = false;
  const isBossWave = wave % 5 === 0;
  if (isBossWave) {
    enemies.push(createEnemy('boss', W/2, 80));
    bossActive = true;
  } else {
    const formations = ['grid', 'v-shape', 'diamond', 'pincer'];
    waveFormation = formations[(wave - 1) % formations.length];
    const count = 5 + wave * 2;
    const types = wave < 3 ? ['grunt'] : wave < 6 ? ['grunt','tank','speeder'] : ['grunt','tank','speeder'];
    for (let i = 0; i < count; i++) {
      const type = types[Math.floor(Math.random()*types.length)];
      const pos = getFormationPos(i, count, waveFormation);
      const e = createEnemy(type, pos.x, pos.y);
      e.homeX = pos.x;
      enemies.push(e);
    }
  }
}

// ===== POWERUP SPAWN =====
function spawnPowerup(x, y) {
  if (Math.random() > 0.35) return;
  const types = ['double','shield','laser','life'];
  const t = types[Math.floor(Math.random()*types.length)];
  powerups.push({ x, y, type: t, vy: 1.5, r: 14, timer: 0 });
}

// ===== PARTICLES =====
function explode(x, y, color, count=16) {
  screenShake = Math.max(screenShake, count > 15 ? 10 : 5);
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = Math.random() * 4 + 1;
    particles.push({ x, y, vx: Math.cos(angle)*speed, vy: Math.sin(angle)*speed,
      r: Math.random()*4+2, life: 1, color, decay: 0.025+Math.random()*0.02 });
  }
}

// ===== SOUND (Web Audio) =====
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

// Master volume
const masterGain = audioCtx.createGain();
masterGain.gain.value = 0.7;
masterGain.connect(audioCtx.destination);

function note(freq, type='square') {
  const o = audioCtx.createOscillator();
  const g = audioCtx.createGain();
  o.type = type;
  o.connect(g); g.connect(masterGain);
  return { o, g };
}

function playSound(type) {
  try {
    const t = audioCtx.currentTime;
    if (type === 'shoot') {
      // Short laser blip
      const { o, g } = note(1200, 'square');
      o.frequency.setValueAtTime(1200, t);
      o.frequency.exponentialRampToValueAtTime(400, t + 0.08);
      g.gain.setValueAtTime(0.12, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.08);
      o.start(t); o.stop(t + 0.08);
    }
    else if (type === 'hit') {
      // Crunch hit
      const { o, g } = note(180, 'sawtooth');
      o.frequency.setValueAtTime(180, t);
      o.frequency.exponentialRampToValueAtTime(60, t + 0.15);
      g.gain.setValueAtTime(0.25, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.15);
      // Noise burst
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.1, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0; i<d.length; i++) d[i] = Math.random()*2-1;
      const src = audioCtx.createBufferSource();
      const ng = audioCtx.createGain();
      src.buffer = buf; src.connect(ng); ng.connect(masterGain);
      ng.gain.setValueAtTime(0.2, t); ng.gain.exponentialRampToValueAtTime(0.001, t+0.1);
      src.start(t);
    }
    else if (type === 'powerup') {
      // Ascending arpeggio
      [523, 659, 784, 1047].forEach((freq, i) => {
        const { o, g } = note(freq, 'triangle');
        g.gain.setValueAtTime(0, t + i*0.07);
        g.gain.linearRampToValueAtTime(0.2, t + i*0.07 + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.07 + 0.12);
        o.start(t + i*0.07); o.stop(t + i*0.07 + 0.12);
      });
    }
    else if (type === 'die') {
      // Big explosion
      const buf = audioCtx.createBuffer(1, audioCtx.sampleRate*0.6, audioCtx.sampleRate);
      const d = buf.getChannelData(0);
      for (let i=0; i<d.length; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/d.length, 1.5);
      const src = audioCtx.createBufferSource();
      const ng = audioCtx.createGain();
      src.buffer = buf; src.connect(ng); ng.connect(masterGain);
      ng.gain.setValueAtTime(0.5, t);
      src.start(t);
      // Low rumble
      const { o, g } = note(60, 'sawtooth');
      o.frequency.exponentialRampToValueAtTime(20, t+0.5);
      g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.5);
      o.start(t); o.stop(t+0.5);
    }
    else if (type === 'bosshit') {
      const { o, g } = note(100, 'sawtooth');
      o.frequency.setValueAtTime(100, t);
      o.frequency.exponentialRampToValueAtTime(40, t+0.25);
      g.gain.setValueAtTime(0.3, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.25);
      o.start(t); o.stop(t+0.25);
    }
    else if (type === 'wave') {
      // Wave start fanfare
      [392, 523, 659, 784].forEach((freq, i) => {
        const { o, g } = note(freq, 'square');
        g.gain.setValueAtTime(0, t + i*0.1);
        g.gain.linearRampToValueAtTime(0.18, t + i*0.1 + 0.05);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.1 + 0.2);
        o.start(t + i*0.1); o.stop(t + i*0.1 + 0.2);
      });
    }
    else if (type === 'playerhit') {
      // Player hurt
      const { o, g } = note(220, 'sawtooth');
      o.frequency.setValueAtTime(220, t);
      o.frequency.exponentialRampToValueAtTime(55, t+0.3);
      g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t+0.3);
      o.start(t); o.stop(t+0.3);
    }
  } catch(e) {}
}

// ===== BACKGROUND MUSIC =====
// Music: DJ Asul - VAI VAI TRAIR
const bgMusic = new Audio('DJ Asul - VAI VAI TRAIR.mp3');
bgMusic.loop = true;
bgMusic.volume = 0.5;

function startMusic() {
  bgMusic.currentTime = 0;
  bgMusic.play().catch(() => {}); // catch autoplay block
}

function stopMusic() {
  bgMusic.pause();
  bgMusic.currentTime = 0;
}

// ===== DRAW HELPERS =====
function drawShip(x, y, size=1) {
  ctx.save();
  ctx.translate(x, y);
  ctx.scale(size, size);
  // Body
  ctx.fillStyle = '#4af';
  ctx.beginPath();
  ctx.moveTo(0, -24); ctx.lineTo(-18, 14); ctx.lineTo(-8, 8); ctx.lineTo(0, 12); ctx.lineTo(8, 8); ctx.lineTo(18, 14);
  ctx.closePath(); ctx.fill();
  // Cockpit
  ctx.fillStyle = '#0ff';
  ctx.beginPath();
  ctx.ellipse(0, -8, 7, 10, 0, 0, Math.PI*2);
  ctx.fill();
  // Wings
  ctx.fillStyle = '#28f';
  ctx.fillRect(-26, 2, 10, 6);
  ctx.fillRect(16, 2, 10, 6);
  // Engine glow
  ctx.fillStyle = `hsl(${frameCount*10%360},100%,60%)`;
  ctx.beginPath();
  ctx.ellipse(-6, 14, 4, 5+Math.sin(frameCount*0.2)*2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(6, 14, 4, 5+Math.sin(frameCount*0.2+1)*2, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
}

function drawEnemy(e) {
  ctx.save();
  ctx.translate(e.x, e.y);
  const bob = Math.sin(frameCount * 0.05 + e.x) * 3;
  ctx.translate(0, bob);

  if (e.type === 'boss') {
    drawBoss(e);
  } else {
    const hw = e.w/2, hh = e.h/2.5;

    // Dark robe body
    ctx.fillStyle = e.type === 'speeder' ? '#1a3a5a' : e.type === 'tank' ? '#3a2000' : '#1a1a2e';
    ctx.beginPath();
    ctx.ellipse(0, 4, hw, hh+4, 0, 0, Math.PI*2);
    ctx.fill();

    // Face (skin tone)
    ctx.fillStyle = '#d4a87a';
    ctx.beginPath();
    ctx.ellipse(0, -2, hw*0.72, hh*0.85, 0, 0, Math.PI*2);
    ctx.fill();

    // Turban / dark headwrap
    const turbColor = e.type === 'speeder' ? '#1a4a1a' : e.type === 'tank' ? '#4a2a00' : '#111';
    ctx.fillStyle = turbColor;
    // Main turban wrap
    ctx.beginPath();
    ctx.ellipse(0, -hh*0.85, hw*0.78, hh*0.52, 0, Math.PI, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(0, -hh*0.6, hw*0.82, hh*0.38, 0, Math.PI, Math.PI*2);
    ctx.fill();
    // Turban knot at front
    ctx.beginPath();
    ctx.ellipse(0, -hh*0.95, hw*0.28, hh*0.22, 0, 0, Math.PI*2);
    ctx.fill();

    // Thick angry eyebrows
    ctx.fillStyle = '#222';
    ctx.beginPath();
    ctx.ellipse(-hw*0.32, -hh*0.35, hw*0.25, hh*0.1, -0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hw*0.32, -hh*0.35, hw*0.25, hh*0.1, 0.3, 0, Math.PI*2);
    ctx.fill();

    // Eyes - glowing red
    ctx.fillStyle = '#ff2200';
    ctx.shadowColor = '#f00'; ctx.shadowBlur = 6;
    ctx.beginPath(); ctx.arc(-hw*0.3, -hh*0.15, hw*0.14, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hw*0.3, -hh*0.15, hw*0.14, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.fillStyle = '#000';
    ctx.beginPath(); ctx.arc(-hw*0.28, -hh*0.15, hw*0.07, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(hw*0.3, -hh*0.15, hw*0.07, 0, Math.PI*2); ctx.fill();

    // White beard
    ctx.fillStyle = '#ddd';
    ctx.beginPath();
    ctx.ellipse(0, hh*0.35, hw*0.55, hh*0.55, 0, 0, Math.PI);
    ctx.fill();
    // Beard wisps
    ctx.strokeStyle = '#ccc'; ctx.lineWidth = 1.5;
    for (let i = -1; i <= 1; i++) {
      ctx.beginPath();
      ctx.moveTo(i * hw*0.3, hh*0.4);
      ctx.quadraticCurveTo(i * hw*0.35, hh*0.75, i * hw*0.25, hh*0.9);
      ctx.stroke();
    }

    // Mustache (dark)
    ctx.fillStyle = '#555';
    ctx.beginPath();
    ctx.ellipse(-hw*0.18, hh*0.12, hw*0.2, hh*0.1, -0.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(hw*0.18, hh*0.12, hw*0.2, hh*0.1, 0.2, 0, Math.PI*2);
    ctx.fill();

    // HP bar for tank
    if (e.type === 'tank' && e.hp < e.maxHp) {
      ctx.fillStyle = '#f00';
      ctx.fillRect(-26, e.h/2+4, 52, 6);
      ctx.fillStyle = '#0f0';
      ctx.fillRect(-26, e.h/2+4, 52*(e.hp/e.maxHp), 6);
    }
  }
  ctx.restore();
}

function drawBoss(e) {
  // Main body
  ctx.fillStyle = '#601060';
  ctx.beginPath();
  ctx.ellipse(0, 0, e.w/2, e.h/2.5, 0, 0, Math.PI*2);
  ctx.fill();
  // Glow
  ctx.shadowColor = '#f0f'; ctx.shadowBlur = 20;
  ctx.strokeStyle = '#f0f'; ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.ellipse(0, 0, e.w/2, e.h/2.5, 0, 0, Math.PI*2);
  ctx.stroke();
  ctx.shadowBlur = 0;
  // Crown (evil crown)
  ctx.fillStyle = '#880';
  ctx.beginPath();
  ctx.moveTo(-36, -e.h/2.5-2);
  ctx.lineTo(-36, -e.h/2.5-20);
  ctx.lineTo(-22, -e.h/2.5-10);
  ctx.lineTo(-10, -e.h/2.5-28);
  ctx.lineTo(0,   -e.h/2.5-14);
  ctx.lineTo(10,  -e.h/2.5-28);
  ctx.lineTo(22,  -e.h/2.5-10);
  ctx.lineTo(36,  -e.h/2.5-20);
  ctx.lineTo(36,  -e.h/2.5-2);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#ff0'; drawStar(-10, -e.h/2.5-28, 7); drawStar(10, -e.h/2.5-28, 7); drawStar(0, -e.h/2.5-14, 6);
  // Eyes - glowing red
  ctx.fillStyle = '#f00';
  ctx.shadowColor = '#f00'; ctx.shadowBlur = 10;
  ctx.beginPath(); ctx.arc(-18, -8, 9, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18, -8, 9, 0, Math.PI*2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(-18, -8, 4, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(18, -8, 4, 0, Math.PI*2); ctx.fill();
  // Mustache
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.ellipse(-12, 10, 10, 5, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12, 10, 10, 5, 0.3, 0, Math.PI*2); ctx.fill();
  // HP bar
  const bw = e.w*1.6;
  ctx.fillStyle = '#300'; ctx.fillRect(-bw/2, e.h/2.5+8, bw, 10);
  ctx.fillStyle = `hsl(${120*(e.hp/e.maxHp)},100%,50%)`;
  ctx.fillRect(-bw/2, e.h/2.5+8, bw*(e.hp/e.maxHp), 10);
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1;
  ctx.strokeRect(-bw/2, e.h/2.5+8, bw, 10);
  // BOSS label
  ctx.fillStyle = '#f0f'; ctx.font = 'bold 12px Courier New';
  ctx.textAlign = 'center';
  ctx.fillText(`BOSS  HP: ${e.hp}/${e.maxHp}`, 0, e.h/2.5+28);
}

function drawStar(x, y, r) {
  ctx.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const b = (i*4*Math.PI/5 + 2*Math.PI/5) - Math.PI/2;
    if (i === 0) ctx.moveTo(x + r*Math.cos(a), y + r*Math.sin(a));
    else ctx.lineTo(x + r*Math.cos(a), y + r*Math.sin(a));
    ctx.lineTo(x + (r*0.4)*Math.cos(b), y + (r*0.4)*Math.sin(b));
  }
  ctx.closePath(); ctx.fill();
}

function drawPowerup(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.timer * 0.05);
  const colors = { double:'#0ff', shield:'#0f0', laser:'#f0f', life:'#f00' };
  const labels = { double:'2x', shield:'🛡', laser:'⚡', life:'♥' };
  ctx.shadowColor = colors[p.type]; ctx.shadowBlur = 12;
  ctx.strokeStyle = colors[p.type]; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(0, 0, p.r, 0, Math.PI*2); ctx.stroke();
  ctx.shadowBlur = 0;
  ctx.fillStyle = colors[p.type];
  ctx.font = 'bold 14px Courier New';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(labels[p.type], 0, 0);
  ctx.restore();
}

// ===== UPDATE =====
function update() {
  if (state !== 'playing') return;
  frameCount++;

  // Player movement - mouse follow
  if (mouseX !== null) {
    const dx = mouseX - player.x, dy = mouseY - player.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    if (dist > 4) {
      const spd = Math.min(player.speed * 1.4, dist);
      player.x += (dx / dist) * spd;
      player.y += (dy / dist) * spd;
    }
    player.x = Math.max(player.w/2, Math.min(W - player.w/2, player.x));
    player.y = Math.max(H/2, Math.min(H - player.h/2, player.y));
  }
  // Keyboard movement
  if ((keys['ArrowLeft'] || keys['KeyA'] || touchState.left) && player.x > player.w/2) player.x -= player.speed;
  if ((keys['ArrowRight'] || keys['KeyD'] || touchState.right) && player.x < W - player.w/2) player.x += player.speed;
  if ((keys['ArrowUp'] || keys['KeyW'] || touchState.up) && player.y > H/2) player.y -= player.speed;
  if ((keys['ArrowDown'] || keys['KeyS'] || touchState.down) && player.y < H - player.h/2) player.y += player.speed;
  if (keys['Space'] || touchState.fire || mouseDown) player.shoot();
  // Floating texts
  floatingTexts.forEach(t => { t.y += t.vy; t.life -= 0.022; });
  floatingTexts = floatingTexts.filter(t => t.life > 0);
  if (player.bulletCooldown > 0) player.bulletCooldown--;
  if (player.invincible > 0) player.invincible--;
  if (player.shield > 0) player.shield--;
  if (player.doubleFire > 0) player.doubleFire--;
  if (player.laser > 0) player.laser--;

  // Stars
  stars.forEach(s => { s.y += s.speed; if (s.y > H) s.y = 0; });

  // Bullets
  bullets = bullets.filter(b => b.y > -20);
  bullets.forEach(b => b.y -= b.speed);

  // Enemy bullets
  enemyBullets = enemyBullets.filter(b => b.y < H + 20);
  enemyBullets.forEach(b => { b.y += b.speed; b.x += (b.vx||0); });

  // Enemies
  let allDead = enemies.length === 0;
  enemies.forEach(e => {
    if (e.type === 'boss') {
      // Boss movement
      e.moveTimer++;
      if (e.moveTimer > 80) { e.moveDir *= -1; e.moveTimer = 0; }
      e.x += e.moveDir * e.speed;
      e.x = Math.max(e.w/2, Math.min(W-e.w/2, e.x));
      // Boss shooting - spread
      e.shootTimer++;
      if (e.shootTimer >= e.shootInterval) {
        e.shootTimer = 0;
        const spread = e.phase === 2 ? 5 : 3;
        for (let i = 0; i < spread; i++) {
          const angle = (Math.PI/2) + (i - (spread-1)/2) * 0.35;
          enemyBullets.push({ x:e.x, y:e.y+e.h/2, speed:4, vx:Math.cos(angle)*3, color:'#f0f', w:8, h:8 });
        }
        // Phase 2 extra attacks
        if (e.hp < e.maxHp*0.5 && e.phase === 1) { e.phase = 2; e.shootInterval = 25; }
      }
    } else {
      // Formation-aware movement
      const driftX = e.homeX !== undefined ? (e.homeX - e.x) * 0.018 : 0;
      e.x += driftX + Math.sin(frameCount * 0.025 + e.y * 0.05) * 0.9;
      e.y += e.speed * 0.28;
      // Shooting
      e.shootTimer++;
      if (e.shootTimer >= e.shootInterval + Math.random()*60) {
        e.shootTimer = 0;
        if (Math.random() < 0.7) {
          enemyBullets.push({ x:e.x, y:e.y+e.h/2, speed: 3+wave*0.3, vx:0, color:'#f44', w:6, h:10 });
        }
      }
      // Enemy reached bottom
      if (e.y > H - 60) { lives--; updateUI(); explode(e.x, e.y, '#f44'); enemies.splice(enemies.indexOf(e), 1); if (lives <= 0) gameOver(); }
    }
  });

  // Bullet vs Enemy collision
  bullets.forEach((b, bi) => {
    enemies.forEach((e, ei) => {
      if (Math.abs(b.x - e.x) < e.w/2+4 && Math.abs(b.y - e.y) < e.h/2+4) {
        bullets.splice(bi, 1);
        e.hp--;
        explode(b.x, b.y, b.color, 6);
        if (e.hp <= 0) {
          score += e.points;
          floatingTexts.push({ x: e.x, y: e.y - 10, text: '+' + e.points, life: 1, vy: -1.8, color: e.type==='boss'?'#f0f':'#ff0' });
          explode(e.x, e.y, e.type==='boss'?'#f0f':e.color, e.type==='boss'?40:20);
          playSound(e.type==='boss'?'die':(e.type==='tank'?'bosshit':'hit'));
          spawnPowerup(e.x, e.y);
          enemies.splice(ei, 1);
          updateUI();
          if (enemies.length === 0) nextWave();
        }
      }
    });
  });

  // Enemy bullet vs player collision
  if (player.invincible <= 0) {
    enemyBullets.forEach((b, i) => {
      if (Math.abs(b.x - player.x) < 22 && Math.abs(b.y - player.y) < 26) {
        enemyBullets.splice(i, 1);
        if (player.shield > 0) {
          player.shield = 0;
          explode(player.x, player.y, '#0f0', 12);
        } else {
          lives--;
          player.invincible = 90;
          screenShake = 14;
          explode(player.x, player.y, '#f44', 20);
          playSound('playerhit');
          updateUI();
          if (lives <= 0) gameOver();
        }
      }
    });
  }

  // Powerup collection
  powerups.forEach((p, i) => {
    p.y += p.vy; p.timer++;
    if (Math.abs(p.x - player.x) < 28 && Math.abs(p.y - player.y) < 28) {
      if (p.type === 'double') player.doubleFire = 300;
      if (p.type === 'shield') player.shield = 300;
      if (p.type === 'laser') player.laser = 200;
      if (p.type === 'life') { lives = Math.min(lives+1, 5); updateUI(); }
      explode(p.x, p.y, '#ff0', 12);
      playSound('powerup');
      powerups.splice(i, 1);
    }
    if (p.y > H) powerups.splice(i, 1);
  });

  // Particles
  particles.forEach(p => { p.x += p.vx; p.y += p.vy; p.vy += 0.1; p.life -= p.decay; });
  particles = particles.filter(p => p.life > 0);
}

// ===== DRAW =====
function draw() {
  ctx.fillStyle = '#050510';
  ctx.fillRect(0, 0, W, H);

  // Screen shake
  const shaking = screenShake > 0;
  if (shaking) {
    ctx.save();
    ctx.translate((Math.random()-0.5)*screenShake, (Math.random()-0.5)*screenShake);
    screenShake = Math.max(0, screenShake - 1);
  }

  // Stars
  stars.forEach(s => {
    const flicker = 0.5 + 0.5 * Math.sin(frameCount * 0.05 + s.bright * 10);
    ctx.fillStyle = `rgba(255,255,255,${flicker * 0.8})`;
    ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI*2); ctx.fill();
  });

  if (state === 'start') { drawStart(); return; }
  if (state === 'gameover') { drawGameOver(); return; }
  if (state === 'victory') { drawVictory(); return; }

  // Game elements
  enemies.forEach(drawEnemy);
  powerups.forEach(drawPowerup);

  // Bullets
  bullets.forEach(b => {
    ctx.shadowColor = b.color; ctx.shadowBlur = 8;
    ctx.fillStyle = b.color;
    if (b.type === 'laser') {
      ctx.fillRect(b.x-b.w/2, b.y - b.h/2, b.w, b.h*3);
    } else {
      ctx.fillRect(b.x-b.w/2, b.y-b.h/2, b.w, b.h);
    }
    ctx.shadowBlur = 0;
  });

  enemyBullets.forEach(b => {
    ctx.shadowColor = b.color; ctx.shadowBlur = 6;
    ctx.fillStyle = b.color;
    ctx.beginPath(); ctx.arc(b.x, b.y, b.w/2, 0, Math.PI*2); ctx.fill();
    ctx.shadowBlur = 0;
  });

  // Player
  if (player.invincible <= 0 || Math.floor(frameCount/6)%2===0) {
    // Shield visual
    if (player.shield > 0) {
      ctx.strokeStyle = `rgba(0,255,0,${0.5+0.5*Math.sin(frameCount*0.2)})`;
      ctx.lineWidth = 3; ctx.shadowColor='#0f0'; ctx.shadowBlur=15;
      ctx.beginPath(); ctx.arc(player.x, player.y, 36, 0, Math.PI*2); ctx.stroke();
      ctx.shadowBlur=0;
    }
    drawShip(player.x, player.y);
    // Powerup indicators
    if (player.doubleFire > 0) { ctx.fillStyle='#0ff'; ctx.font='10px Courier New'; ctx.textAlign='center'; ctx.fillText('2x', player.x+26, player.y-20); }
    if (player.laser > 0) { ctx.fillStyle='#f0f'; ctx.font='10px Courier New'; ctx.textAlign='center'; ctx.fillText('⚡', player.x-26, player.y-20); }
  }

  // Particles
  particles.forEach(p => {
    ctx.globalAlpha = p.life;
    ctx.fillStyle = p.color;
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r * p.life, 0, Math.PI*2); ctx.fill();
  });
  ctx.globalAlpha = 1;

  // Floating score texts
  floatingTexts.forEach(t => {
    ctx.globalAlpha = t.life;
    ctx.fillStyle = t.color;
    ctx.font = 'bold 18px Courier New';
    ctx.textAlign = 'center';
    ctx.shadowColor = t.color; ctx.shadowBlur = 8;
    ctx.fillText(t.text, t.x, t.y);
    ctx.shadowBlur = 0;
  });
  ctx.globalAlpha = 1;

  if (shaking) ctx.restore();

  // Touch buttons (drawn outside shake transform)
  if (isTouchDevice && state === 'playing') drawTouchButtons();

  // Wave banner
  if (waveBannerTimer > 0) {
    const alpha = Math.min(1, waveBannerTimer / 20);
    ctx.globalAlpha = alpha;
    ctx.fillStyle = '#0ff'; ctx.font = 'bold 38px Courier New';
    ctx.textAlign = 'center';
    const formationNames = { grid:'שורות', 'v-shape':'V-צורת', diamond:'יהלום', pincer:'מלקחיים' };
    ctx.fillText(`גל ${wave - 1}  ·  ${formationNames[waveFormation] || waveFormation}`, W/2, H/2);
    ctx.globalAlpha = 1;
    waveBannerTimer--;
  }

  if (state === 'paused') {
    ctx.fillStyle = 'rgba(0,0,0,0.5)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 48px Courier New';
    ctx.textAlign = 'center'; ctx.fillText('PAUSED', W/2, H/2);
    ctx.font = '20px Courier New'; ctx.fillText('לחץ P להמשך', W/2, H/2+50);
  }
}

function drawStart() {
  ctx.textAlign = 'center';
  // Title
  ctx.font = 'bold 52px Courier New';
  const grad = ctx.createLinearGradient(0, H/2-120, 0, H/2-60);
  grad.addColorStop(0, '#0ff'); grad.addColorStop(1, '#00f');
  ctx.fillStyle = grad;
  ctx.shadowColor = '#0ff'; ctx.shadowBlur = 20;
  ctx.fillText('שאגת', W/2, H/2 - 90);
  ctx.fillText('הארי 🦁', W/2, H/2 - 35);
  ctx.shadowBlur = 0;
  ctx.font = '18px Courier New'; ctx.fillStyle = '#aaa';
  ctx.fillText('הגן על ישראל מפני האיום האיראני!', W/2, H/2 + 10);
  // High score
  if (highScore > 0) {
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 20px Courier New';
    ctx.fillText(`🏆 שיא: ${highScore}`, W/2, H/2 + 10);
  }
  // Controls
  ctx.fillStyle = '#0ff'; ctx.font = '14px Courier New';
  ctx.fillText('⬅➡ / WASD - תנועה    SPACE - ירי    P - השהה', W/2, H/2 + 55);
  ctx.fillText('Power-ups: 2x ירי כפול  🛡 מגן  ⚡ לייזר  ♥ חיים', W/2, H/2 + 80);
  // Press start
  if (Math.floor(frameCount/30)%2===0) {
    ctx.fillStyle = '#ff0'; ctx.font = 'bold 24px Courier New';
    ctx.fillText('לחץ SPACE / ENTER להתחיל', W/2, H/2 + 140);
  }
}

function drawGameOver() {
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f44'; ctx.font = 'bold 60px Courier New';
  ctx.shadowColor = '#f00'; ctx.shadowBlur = 20;
  ctx.fillText('GAME OVER', W/2, H/2 - 60);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#fff'; ctx.font = '24px Courier New';
  ctx.fillText(`ניקוד: ${score}`, W/2, H/2);
  ctx.fillText(`גל הגעת: ${wave}`, W/2, H/2 + 38);
  ctx.fillStyle = '#ff0'; ctx.font = '20px Courier New';
  ctx.fillText(`🏆 שיא: ${highScore}`, W/2, H/2 + 75);
  if (Math.floor(frameCount/30)%2===0) {
    ctx.fillStyle = '#0ff'; ctx.font = 'bold 20px Courier New';
    ctx.fillText('SPACE / ENTER לשחק שוב', W/2, H/2 + 115);
  }
}

function drawVictory() {
  ctx.textAlign = 'center';
  const hue = (frameCount*2)%360;
  ctx.fillStyle = `hsl(${hue},100%,60%)`; ctx.font = 'bold 52px Courier New';
  ctx.shadowColor = `hsl(${hue},100%,60%)`; ctx.shadowBlur = 20;
  ctx.fillText('VICTORY!', W/2, H/2 - 80);
  ctx.shadowBlur = 0;
  ctx.fillStyle = '#ff0'; ctx.font = '28px Courier New';
  ctx.fillText('ישראל נצחה! 🇮🇱', W/2, H/2 - 30);
  ctx.fillStyle = '#fff'; ctx.font = '24px Courier New';
  ctx.fillText(`ניקוד סופי: ${score}`, W/2, H/2 + 20);
  ctx.fillStyle = '#ff0'; ctx.font = '20px Courier New';
  ctx.fillText(`🏆 שיא: ${highScore}`, W/2, H/2 + 55);
  if (Math.floor(frameCount/30)%2===0) {
    ctx.fillStyle = '#0ff'; ctx.font = 'bold 20px Courier New';
    ctx.fillText('SPACE / ENTER לשחק שוב', W/2, H/2 + 100);
  }
}

function updateUI() {
  document.getElementById('lives').textContent = '❤️'.repeat(Math.max(0,lives));
  document.getElementById('score').textContent = score;
  document.getElementById('wave').textContent = wave;
}

function nextWave() {
  wave++;
  if (wave > maxWave) {
    state = 'victory'; stopMusic();
    if (score > highScore) { highScore = score; localStorage.setItem('shagatHaariHighScore', highScore); }
    return;
  }
  playSound('wave');
  waveBannerTimer = 90;
  setTimeout(() => { if (state === 'playing') spawnWave(); }, 1500);
}

function startGame() {
  state = 'playing';
  stopMusic();
  score = 0; lives = 3; wave = 1; frameCount = 0;
  bullets = []; enemyBullets = []; enemies = []; powerups = []; particles = []; floatingTexts = [];
  player.x = W/2; player.y = H-70;
  player.shield = 0; player.doubleFire = 0; player.laser = 0; player.invincible = 0;
  updateUI();
  spawnWave();
  startMusic();
}

function gameOver() {
  state = 'gameover';
  frameCount = 0;
  stopMusic();
  playSound('die');
  if (score > highScore) { highScore = score; localStorage.setItem('shagatHaariHighScore', highScore); }
}

// ===== TOUCH BUTTONS DRAW =====
function drawTouchButtons() {
  ctx.save();
  ctx.globalAlpha = 0.55;
  for (const [name, b] of Object.entries(TOUCH_BTNS)) {
    const active = touchState[name];
    ctx.fillStyle = active ? 'rgba(0,255,255,0.5)' : 'rgba(255,255,255,0.12)';
    ctx.strokeStyle = active ? '#0ff' : 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 10);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = active ? '#000' : '#fff';
    ctx.font = 'bold 22px Courier New';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    const labels = { left:'◀', right:'▶', up:'▲', fire:'🔥' };
    ctx.fillText(labels[name], b.x + b.w/2, b.y + b.h/2);
  }
  ctx.textBaseline = 'alphabetic';
  ctx.restore();
}

// ===== LOOP =====
function loop() {
  update();
  draw();
  requestAnimationFrame(loop);
}

loop();
</script>
